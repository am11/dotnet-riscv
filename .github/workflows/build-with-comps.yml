name: Build .NET SDK (with components)

on:
  workflow_dispatch:
    inputs:
      fork:
        description: 'dotnet VMR fork name'
        required: true
        type: string
        default: dotnet
      branch:
        description: 'dotnet VMR branch name'
        required: true
        type: string
        default: main
      branding:
        description: 'SDK branding'
        required: true
        type: choice
        options:
          - unstable
          - preview
          - release
        default: preview
      release:
        description: 'publish release'
        type: boolean

jobs:
  build:
    env:
      ROOTFS_DIR: /crossrootfs/riscv64
      SHARED_COMPONENTS_DIR:
    strategy:
      matrix:
        include:
          - name: linux
            libc: glibc
            docker_tag: azurelinux-3.0-net10.0-cross-riscv64
          - name: linux-musl
            libc: musl
            docker_tag: azurelinux-3.0-net10.0-cross-riscv64-musl
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Show workflow inputs
      run: |
        echo "Workflow inputs:"
        echo "fork: ${{ inputs.fork }}"
        echo "branch: ${{ inputs.branch }}"
        echo "branding: ${{ inputs.branding }}"
        echo "release: ${{ inputs.release }}"

    - name: Maximize build space
      uses: AdityaGarg8/remove-unwanted-software@v4.1
      with:
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-cached-tools: 'true'

    - name: Clone repository
      run: |
        git clone --single-branch --depth 1 -b ${{ inputs.branch }} https://github.com/${{ inputs.fork }}/dotnet

    - name: Apply patches
      run: |
        # needed for .NET 10 linux-musl-riscv64, remove it once we move on from .NET 10
        curl -sSL https://github.com/am11/runtime/commit/fa6e00abe9be4a451d81a29309c933435db8fe40.patch |\
          git -C dotnet/ apply -v --directory=src/runtime || true

    - name: Resolve shared components
      run: |
        set -euo pipefail
        branch="${{ inputs.branch }}"
        asset_suffix="${{ matrix.name }}-riscv64"

        if [[ ! "$branch" =~ ^v?([0-9]+)\.0\.([0-9])[0-9]{2}($|[.-]) ]]; then
          echo "Branch '$branch' is not a feature-band branch; skipping shared components."
          exit 0
        fi

        major="${BASH_REMATCH[1]}"
        band_digit="${BASH_REMATCH[2]}"

        if [ "$band_digit" = "1" ]; then
          echo "Detected ${major}.0.1xx branch; shared components are produced by this build, so none are consumed."
          exit 0
        fi

        host_shared_components_dir="${{ github.workspace }}/.shared-components"
        container_shared_components_dir="/shared-components"
        rm -rf "$host_shared_components_dir"
        mkdir -p "$host_shared_components_dir"

        releases_api="https://api.github.com/repos/${{ github.repository }}/releases?per_page=100"
        shared_components_tag=$(curl -fsSL \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "$releases_api" | \
          jq -r --arg major "$major" '
            map(select(.draft | not))
            | map(select(.tag_name | test("^" + $major + "\\.0\\.1[0-9]{2}($|[.-])")))
            | map(select(any(.assets[]?; .name | test("^Private\\.SourceBuilt\\.Artifacts\\..*\\.tar\\.gz$"))))
            | .[0].tag_name // empty
          ')

        if [ -z "$shared_components_tag" ]; then
          echo "No release found with tag '${major}.0.1xx' containing Private.SourceBuilt.Artifacts.*.tar.gz"
          echo "Build and release a ${major}.0.1xx first (with this workflow) so 2xx/3xx/4xx can consume shared components."
          exit 1
        fi

        echo "Using shared components from release tag: $shared_components_tag"

        release_api="https://api.github.com/repos/${{ github.repository }}/releases/tags/$shared_components_tag"
        assets_json=$(curl -fsSL \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "$release_api")

        private_asset_name=$(echo "$assets_json" | jq -r --arg suffix "$asset_suffix" '
          [.assets[]
            | select(
                (.name | startswith("Private.SourceBuilt.Artifacts."))
                and (.name | endswith("." + $suffix + ".tar.gz"))
              )
          ][0].name // empty
        ')
        private_asset_url=$(echo "$assets_json" | jq -r --arg suffix "$asset_suffix" '
          [.assets[]
            | select(
                (.name | startswith("Private.SourceBuilt.Artifacts."))
                and (.name | endswith("." + $suffix + ".tar.gz"))
              )
          ][0].browser_download_url // empty
        ')

        if [ -z "$private_asset_name" ] || [ -z "$private_asset_url" ]; then
          echo "No Private.SourceBuilt.Artifacts.*.$asset_suffix.tar.gz asset found in release tag '$shared_components_tag'"
          exit 1
        fi

        private_asset_path="$host_shared_components_dir/$private_asset_name"
        echo "Downloading $private_asset_name"
        curl -fL "$private_asset_url" -o "$private_asset_path"

        echo "Extracting $private_asset_name"
        tar -xzf "$private_asset_path" -C "$host_shared_components_dir"
        rm -f "$private_asset_path"

        # Some releases may not embed dotnet-symbols-all inside the artifacts archive.
        # Ensure it exists under assets/Release so init-source-only can consume it.
        if ! compgen -G "$host_shared_components_dir/assets/Release/dotnet-symbols-all-*-$asset_suffix.tar.gz" > /dev/null; then
          symbols_asset_name=$(echo "$assets_json" | jq -r --arg suffix "$asset_suffix" '
            [.assets[]
              | select(
                  (.name | startswith("dotnet-symbols-all-"))
                  and (.name | endswith("-" + $suffix + ".tar.gz"))
                )
            ][0].name // empty
          ')
          symbols_asset_url=$(echo "$assets_json" | jq -r --arg suffix "$asset_suffix" '
            [.assets[]
              | select(
                  (.name | startswith("dotnet-symbols-all-"))
                  and (.name | endswith("-" + $suffix + ".tar.gz"))
                )
            ][0].browser_download_url // empty
          ')

          if [ -z "$symbols_asset_name" ] || [ -z "$symbols_asset_url" ]; then
            echo "No dotnet-symbols-all-*-$asset_suffix.tar.gz asset found in release tag '$shared_components_tag'"
            echo "Rebuild/release ${major}.0.1xx with symbol archives uploaded so 2xx/3xx/4xx can consume shared components."
            exit 1
          fi

          mkdir -p "$host_shared_components_dir/assets/Release"
          echo "Downloading $symbols_asset_name"
          curl -fL "$symbols_asset_url" -o "$host_shared_components_dir/assets/Release/$symbols_asset_name"
        fi

        if ! compgen -G "$host_shared_components_dir/assets/Release/dotnet-symbols-all-*.tar.gz" > /dev/null; then
          echo "No dotnet-symbols-all-*.tar.gz found under $host_shared_components_dir/assets/Release after resolving shared components"
          exit 1
        fi

        echo "SHARED_COMPONENTS_DIR=$container_shared_components_dir" >> "$GITHUB_ENV"

    - name: Show resolved shared components
      run: |
        echo "Contents of $SHARED_COMPONENTS_DIR:"
        find "${{ github.workspace }}/.shared-components"

    - name: Build
      run: |
        docker run --platform linux/amd64 --rm -v${{ github.workspace }}/dotnet:/dotnet -v${{ github.workspace }}/.shared-components:/shared-components -w /dotnet -e ROOTFS_DIR -e SHARED_COMPONENTS_DIR \
          mcr.microsoft.com/dotnet-buildtools/prereqs:${{ matrix.docker_tag }} \
            ./build.sh --clean-while-building --prep -sb --os ${{ matrix.name }} --rid ${{ matrix.name }}-riscv64 \
              --arch riscv64 --branding ${{ inputs.branding }} -p:OfficialBuildId=$(date +%Y%m%d).99 \
              $([ -n "${SHARED_COMPONENTS_DIR:-}" ] && echo "--with-packages $SHARED_COMPONENTS_DIR --with-shared-components $SHARED_COMPONENTS_DIR")

    - name: List assets directory
      run: |
        find "${{ github.workspace }}/dotnet/artifacts"

    - name: Upload .NET
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-sdk-${{ matrix.name }}
        path: |
          ${{ github.workspace }}/dotnet/artifacts/assets/Release/Sdk/*/dotnet-sdk-*.tar.gz
          ${{ github.workspace }}/dotnet/artifacts/assets/Release/dotnet-symbols-all-*.tar.gz
          ${{ github.workspace }}/dotnet/artifacts/assets/Release/Private.SourceBuilt.Artifacts.*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ inputs.release }}
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Make release
      run: |
        sudo apt install -y hub

        # hub(1) requires release to be created inside a git repo
        git clone https://${{ secrets.CLONE_TOKEN }}:x-oauth-basic@github.com/${{ github.repository }}.git repo
        cd repo

        sdk_paths=$(find ${{ github.workspace }}/artifacts -name 'dotnet-sdk-*.tar.gz')
        symbols_paths=$(find ${{ github.workspace }}/artifacts -name 'dotnet-symbols-all-*.tar.gz')
        source_built_artifact_paths=$(find ${{ github.workspace }}/artifacts -name 'Private.SourceBuilt.Artifacts.*.tar.gz')
        artifacts=""
        for sdk_path in $sdk_paths; do
          sdk_filename=$(basename "$sdk_path")
          # Extract version: strip prefix/suffix to get e.g. "10.0.100-preview.5.25277.114"
          sdk_version=$(echo "$sdk_filename" | sed -E 's/dotnet-sdk-([^-]+(-[^-]+)*)-linux-.+\.tar\.gz/\1/')
          artifacts="$artifacts -a $sdk_path"
          tag_name="$sdk_version"
        done

        for source_built_artifact_path in $source_built_artifact_paths; do
          artifacts="$artifacts -a $source_built_artifact_path"
        done

        for symbols_path in $symbols_paths; do
          artifacts="$artifacts -a $symbols_path"
        done

        echo "tag_name: $tag_name"
        echo "artifacts: $artifacts"

        # docs: https://hub.github.com/hub-release.1.html
        hub release create $artifacts ${{ inputs.branding != 'release' && '--prerelease' || '' }} -m "$tag_name" "$tag_name"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
